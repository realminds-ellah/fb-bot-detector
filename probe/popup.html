<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px/1.45 -apple-system, system-ui, sans-serif;
        width: 460px;
        margin: 0;
        padding: 12px;
        color: #111;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 10px;
        color: #555;
      }
      button {
        font: inherit;
        padding: 7px 12px;
        border: 0;
        border-radius: 6px;
        background: #1877f2;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #166fe0;
      }
      pre {
        margin: 10px 0 0;
        padding: 10px;
        background: #f4f5f7;
        border-radius: 6px;
        max-height: 380px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font: 11px/1.4 ui-monospace, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <h1>FB Engagement Probe</h1>
    <p>
      Open a Facebook post, then Scan. To test reactor visibility, click the
      post's reaction count to open the dialog first, then Scan again.
    </p>
    <button id="scan">Scan this page</button>
    <pre id="out">No scan yet.</pre>
    <script src="popup.js"></script>
  </body>
</html>
